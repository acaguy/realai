  /* ───────────────────────────────────────────────
     QUIZ LOGIC
  ─────────────────────────────────────────────── */
  let quizQuestions = [];
  let currentIndex = 0;
  let score = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startQuiz() {
    quizQuestions = shuffle([
      ...shuffle(group1).slice(0, 5),
      ...shuffle(group2).slice(0, 5)
    ]);
    currentIndex = 0;
    score = 0;
    show('quizScreen');
    hide('startScreen');
    showQuestion();
  }

  function showQuestion() {
    const q = quizQuestions[currentIndex];
    const total = quizQuestions.length;

    document.getElementById('passageText').textContent = q.text;
    document.getElementById('questionCount').textContent =
      `Question ${currentIndex + 1} of ${total}`;
    document.getElementById('progressFill').style.width =
      `${(currentIndex / total) * 100}%`;

    // Reset buttons
    ['humanBtn', 'aiBtn'].forEach(id => {
      const btn = document.getElementById(id);
      btn.className = 'choice-btn';
      btn.disabled = false;
    });

    // Reset feedback
    const fb = document.getElementById('feedbackBox');
    fb.className = 'feedback-box';
    fb.innerHTML = '';

    // Hide next button
    document.getElementById('nextBtn').classList.add('hidden');

    // Scroll passage to top
    document.getElementById('passageText').scrollTop = 0;
  }

  function selectAnswer(chosen) {
    const q = quizQuestions[currentIndex];
    const isCorrect = chosen === q.answer;

    const humanBtn = document.getElementById('humanBtn');
    const aiBtn   = document.getElementById('aiBtn');
    humanBtn.disabled = true;
    aiBtn.disabled   = true;

    const chosenBtn  = chosen === 'Human' ? humanBtn : aiBtn;
    const correctBtn = q.answer === 'Human' ? humanBtn : aiBtn;

    if (isCorrect) {
      chosenBtn.classList.add('correct');
      score++;
    } else {
      chosenBtn.classList.add('incorrect');
      correctBtn.classList.add('reveal');
    }

    const fb = document.getElementById('feedbackBox');
    if (isCorrect) {
      fb.className = 'feedback-box show correct';
      fb.innerHTML = `✓ Correct! This was written by a <strong>${q.answer}</strong>.`;
    } else {
      fb.className = 'feedback-box show incorrect';
      fb.innerHTML = `✗ Incorrect. This was written by a <strong>${q.answer}</strong>.`;
    }

    const nextBtn = document.getElementById('nextBtn');
    nextBtn.classList.remove('hidden');
    nextBtn.textContent =
      currentIndex === quizQuestions.length - 1 ? 'See Results →' : 'Next Question →';
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= quizQuestions.length) {
      showResults();
    } else {
      showQuestion();
    }
  }

  function showResults() {
    document.getElementById('progressFill').style.width = '100%';
    hide('quizScreen');
    show('resultsScreen');

    document.getElementById('scoreNum').textContent = score;

    const pct = score / quizQuestions.length;
    let heading, msg;
    if (pct === 1) {
      heading = 'Perfect Score! 🎉';
      msg = 'Flawless — you can spot the difference between human and AI writing every time.';
    } else if (pct >= 0.8) {
      heading = 'Excellent! 🌟';
      msg = "You've got a sharp eye for AI-generated text. Only a couple slipped past you.";
    } else if (pct >= 0.6) {
      heading = 'Good Job! 👍';
      msg = 'More right than wrong — this is genuinely tricky. Give it another go!';
    } else if (pct >= 0.4) {
      heading = 'Not Bad 🤔';
      msg = 'AI writing has come a long way. Try again and see if your score improves!';
    } else {
      heading = 'Keep Practicing! 💪';
      msg = 'AI can be surprisingly convincing. Play again — the questions randomize each time!';
    }

    document.getElementById('resultsHeading').textContent = heading;
    document.getElementById('resultsMsg').textContent = msg;
  }

  function restartQuiz() {
    hide('resultsScreen');
    show('startScreen');
    document.getElementById('progressFill').style.width = '0%';
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }
</script>
